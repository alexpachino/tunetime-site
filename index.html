<html lang="en">

  <title>Tune Time</title>
  <meta name="description" content="Tune Time is a musician's utility app — a chromatic tuner, metronome, and pitch keyboard. No ads. No subscriptions. Just the tools.">
  <meta property="og:title" content="Tune Time">
  <meta property="og:description" content="A musician's toolkit, done right.">

  <meta property="og:image:height" content="1260">

  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@300;400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #F0EFE9;
      --text: #1a1a1a;
      --muted: #777;
    }

    @media (prefers-color-scheme: dark) {
      .app-icon { filter: invert(1); }
      :root {
        --bg: #111;
        --text: #f0efe9;
        --muted: #888;
      }
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-font-smoothing: antialiased; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px 100px;
      min-height: 100vh;
    }

    .hero-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 580px;
    }

    .wordmark-row {
      display: flex;
      align-items: center;
      gap: 20px;
      opacity: 0;
      animation: fadeUp 0.8s ease-out 0.1s forwards;
    }

    .app-icon {
      height: 68px;
      width: auto;
      flex-shrink: 0;
      display: block;
    }

    .wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: clamp(52px, 9vw, 80px);
      letter-spacing: -0.01em;
      line-height: 1;
      color: var(--text);
    }

    .tagline {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 12px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      margin-top: 18px;
      opacity: 0;
      animation: fadeUp 0.8s ease-out 0.3s forwards;
    }

    .description {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 16px;
      line-height: 1.7;
      text-align: center;
      color: var(--muted);
      margin-top: 28px;
      max-width: 360px;
      opacity: 0;
      animation: fadeUp 0.8s ease-out 0.45s forwards;
    }

    .cta-group {
      margin-top: 44px;
      opacity: 0;
      animation: fadeUp 0.8s ease-out 0.6s forwards;
    }

    .app-store-badge {
      display: inline-block;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .app-store-badge:hover { transform: scale(0.97); opacity: 0.8; }
    .app-store-badge:active { transform: scale(0.95); }

    .app-store-badge img {
      display: block;
      height: 54px;
      width: auto;
    }

    footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 16px 24px calc(16px + env(safe-area-inset-bottom, 0px));
      text-align: center;
      background: linear-gradient(to top, var(--bg) 60%, transparent);
      z-index: 10;
    }

    footer nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    footer a, footer a:visited {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 12px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s ease;
    }

    footer a:hover { color: var(--text); }

    .footer-dot {
      width: 2px; height: 2px;
      border-radius: 50%;
      background: var(--muted);
      opacity: 0.5;
      display: inline-block;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .hero { padding: 60px 20px 80px; }
      .app-icon { height: 52px; }
      .wordmark { font-size: 50px; }
      .wordmark-row { gap: 14px; }
      .description { font-size: 15px; }
    }
  </style>
</head>
